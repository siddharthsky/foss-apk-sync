name: Fetch Latest APK URLs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - apps.json

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y jq curl

      - run: mkdir -p version

      - name: Build README
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          DATE=$(date -u +"%Y-%m-%d")
          AUTH="Authorization: Bearer $GH_TOKEN"

          echo "# 📦 FOSS APK Sync" > README.md
          echo "" >> README.md
          echo "| App | Version | Download | Last Updated |" >> README.md
          echo "|-----|--------|----------|--------------|" >> README.md

          jq -c '.[]' apps.json | while read app; do

            NAME=$(jq -r '.name' <<< "$app")
            TYPE=$(jq -r '.type' <<< "$app")

            VERSION="unknown"
            URL=""

            if [[ "$TYPE" == "static" ]]; then

              VERSION=$(jq -r '.version' <<< "$app")
              URL=$(jq -r '.url' <<< "$app")

            else

              REPO=$(jq -r '.repo' <<< "$app")
              API="https://api.github.com/repos/$REPO/releases"

              JSON=$(curl -sH "$AUTH" "$API")

              if jq -e '.prerelease' <<< "$app" >/dev/null; then
                RELEASE=$(jq '[.[] | select(.prerelease==true)] | first' <<< "$JSON")
              else
                RELEASE=$(jq '[.[] | select(.prerelease==false)] | first' <<< "$JSON")
              fi

              VERSION=$(jq -r '.tag_name' <<< "$RELEASE")

              if jq -e '.version_trim' <<< "$app" >/dev/null; then
                TRIM=$(jq -r '.version_trim' <<< "$app")
                VERSION=${VERSION:0:$TRIM}
              fi

              ASSETS=$(jq '.assets' <<< "$RELEASE")

              if jq -e '.asset_name' <<< "$app" >/dev/null; then
                NAME_MATCH=$(jq -r '.asset_name' <<< "$app")
                URL=$(jq -r --arg n "$NAME_MATCH" '.[]|select(.name==$n)|.browser_download_url' <<< "$ASSETS")
              else
                REGEX=$(jq -r '.asset_regex' <<< "$app")
                URL=$(jq -r --arg r "$REGEX" '.[]|select(.name|test($r))|.browser_download_url' <<< "$ASSETS")
              fi

              VERSION_FILE=$(jq -r '.version_file' <<< "$app")
              echo "$VERSION" > "version/$VERSION_FILE"

            fi

            [[ -z "$URL" ]] && continue

            echo "| **$NAME** | $VERSION | [Download APK]($URL) | $DATE |" >> README.md

          done

      - name: Commit if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          if git status --porcelain | grep -E "README.md|version"; then
            git add README.md version
            git commit -m "update APK versions"
            git push
          fi
